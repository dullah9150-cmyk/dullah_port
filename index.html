<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic SEO -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Title (Important for SEO) -->
    <title>Abdullah | Frontend Developer Portfolio | React Developer</title>

    <!-- Meta Description -->
    <meta 
      name="description" 
      content="Abdullah Frontend Developer Portfolio. React JS Developer showcasing projects, skills, and experience in modern web development." 
    />

    <!-- Keywords -->
    <meta 
      name="keywords" 
      content="Abdullah, React Developer, Frontend Developer, Web Developer, Portfolio, JavaScript, HTML, CSS, React JS" 
    />

    <!-- Author -->
    <meta name="author" content="Abdullah" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Social Media SEO) -->
    <meta property="og:title" content="Abdullah Frontend Developer Portfolio" />
    <meta property="og:description" content="React Developer Portfolio with projects and skills" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourwebsite.com" />
    <meta property="og:image" content="/preview.png" />

    <!-- Twitter SEO -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Abdullah Frontend Developer Portfolio" />
    <meta name="twitter:description" content="React Developer Portfolio" />
    <meta name="twitter:image" content="/preview.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Fonts -->
    <link 
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" 
      rel="stylesheet"
    />

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
